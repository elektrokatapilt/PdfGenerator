<h2>DJMLnet</h2>

<!-- Auswahl zwischen Lebenslauf und Bewerbung -->
<div id="welcome" class="section">
    <p>Willkommen bei Dnet! Bitte wählen Sie zuerst, was Sie erstellen möchten:</p>
    <button onclick="chooseOption('lebenslauf')">Lebenslauf erstellen</button>

<script>
window.onload = function() {
    const today = new Date();
    const day = String(today.getDate()).padStart(2, '0');
    const month = String(today.getMonth() + 1).padStart(2, '0'); // месяцы 0–11

async function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y = 20;

    // Firmeninformationen
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    const company = document.getElementById('companyName').value + "\n" +
                    document.getElementById('companyStreet').value + "\n" +
                    document.getElementById('companyEmail').value;
    doc.text(doc.splitTextToSize(company, 140), 20, y);
    y += 35;

    // Persönliche Informationen
    doc.setFont("helvetica", "normal");
    const personal = document.getElementById('personalName').value + "\n" +
                     document.getElementById('personalAddress').value + "\n" +
                     document.getElementById('personalPhone').value + "\n" +
                     document.getElementById('personalEmail').value;
    doc.text(doc.splitTextToSize(personal, 140), 20, y);
    y += 35;

    // Ort & Datum
    const placeDate = document.getElementById('place').value + ", " + document.getElementById('date').value;
    doc.text(placeDate, 20, y);
    y += 12;

    // Bewerbungstitel
    const jobTitle = document.getElementById('jobTitle').value;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(14);
    doc.text("Bewerbung " + jobTitle, 20, y);
    y += 12;

    // Bewerbungstext
   const bewerbungText = generateRandomBewerbung(

);
